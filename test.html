
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="origin">
<title>Live Webinar</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700&display=swap');

:root {
--primary: #00c6ff;
--primary-dark: #0072ff;
--bg: #f5f7fa;
--text: #1a1a1a;
--text-light: #666666;
--shadow: 0 4px 20px rgba(0,0,0,0.08);
--card-bg: #ffffff;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
font-family: 'Satoshi', sans-serif;
background: var(--bg);
color: var(--text);
display: flex;
justify-content: center;
padding: 20px;
}

.content-wrapper {
width: 100%;
max-width: 480px;
}

.live {
background: red;
color: white;
padding: 6px 14px;
border-radius: 20px;
font-size: 12px;
font-weight: 700;
margin-bottom: 10px;
display: inline-block;
}

.video-container {
position: relative;
width: 100%;
aspect-ratio: 16/9;
border-radius: 12px;
overflow: hidden;
box-shadow: var(--shadow);
margin-bottom: 16px;
}

/* Click overlay */
#clickOverlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 2;
cursor: pointer;
}

iframe {
width: 100%;
height: 100%;
border: none;
border-radius: 12px;
}

h1 {
font-size: 20px;
margin-bottom: 10px;
}

.speaker {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 16px;
}

.avatar {
width: 48px;
height: 48px;
border-radius: 10px;
overflow: hidden;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}

.details .name {
font-weight: 700;
}

.details .title {
color: var(--text-light);
font-size: 14px;
}

.about-card {
background: var(--card-bg);
padding: 16px;
border-radius: 8px;
box-shadow: var(--shadow);
margin-bottom: 16px;
}

.close-text {
text-align: center;
color: var(--primary);
cursor: pointer;
text-decoration: underline;
}
</style>
</head>

<body>
<div class="content-wrapper">

<div class="live">LIVE NOW</div>

<div class="video-container">
<div id="clickOverlay"></div>

<iframe id="player"
allow="autoplay; encrypted-media"
allowfullscreen
playsinline>
</iframe>

</div>

<h1 id="webinar-title"></h1>

<div class="speaker">
<div class="avatar">
<img id="speaker-avatar">
</div>
<div class="details">
<div class="name" id="speaker-name"></div>
<div class="title" id="speaker-title"></div>
</div>
</div>

<div class="about-card">
<p id="webinar-description"></p>
</div>

<div class="close-text" id="closeButton">Close Webinar</div>

</div>

<script>
// CONFIG
const config = {
title: "F&O Market Outlook",
youtubeVideoId: "TYGxcesWJH0",

speakerName: "Yogesh Nanda",
speakerTitle: "CA & Options Trader",
speakerAvatar: "https://d3eqyohhnb5anr.cloudfront.net/1670582272/assets/0a6bccfaae644f87b88f581376b6f1f7.jpeg",

description: `Join seasoned trader Yogesh Nanda daily for a crisp live market analysis covering news, sentiments, FII/DII data and options trends.<br><br>This webinar is for educational purposes only.`
};

// URL GENERATOR
function getYouTubeUrls(id) {
return {
watch: `https://www.youtube.com/watch?v=${id}`,
embed: `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1`
};
}

// REDIRECT FUNCTION
function redirect(url) {
if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
window.location.href = url;
} else {
window.open(url, "_blank");
}
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
const yt = getYouTubeUrls(config.youtubeVideoId);

// set iframe
document.getElementById("player").src = yt.embed;

// redirect on click
document.getElementById("clickOverlay").onclick = () => {
redirect(yt.watch);
};

// fill content
document.getElementById("webinar-title").textContent = config.title;
document.getElementById("speaker-name").textContent = config.speakerName;
document.getElementById("speaker-title").textContent = config.speakerTitle;
document.getElementById("speaker-avatar").src = config.speakerAvatar;
document.getElementById("webinar-description").innerHTML = config.description;
});

// CLOSE LOGIC
let startTime = new Date();

document.getElementById("closeButton").onclick = () => {
let duration = Math.round((new Date() - startTime)/1000);

console.log("Closed webinar. Duration:", duration);

try {
window.location.replace("wzrk://thisisadummylink");
} catch {
document.body.style.display = "none";
}
};
</script>

</body>
</html>
